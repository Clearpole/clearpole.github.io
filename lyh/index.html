<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>你在终点等我</title>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
    />
    <script type="module" src="https://unpkg.com/@material/web/all.js"></script>

    <style>
      :root {
        --primary: #6750a4;
        --panel-bg: rgba(255, 255, 255, 0.18);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: Roboto, "Microsoft YaHei", sans-serif;
        background: #000;
      }

      .viewer {
        position: fixed;
        inset: 0;
        overflow: hidden;
      }

      .viewer img {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        display: block;
        user-select: none;
        -webkit-user-drag: none;
      }

      .bottom-panel {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);

        width: min(900px, calc(100vw - 24px));

        padding: 18px 20px;

        background: var(--panel-bg);

        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);

        border-radius: 28px;

        border: 1px solid rgba(255, 255, 255, 0.25);

        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.35);

        z-index: 100;
      }

      .page-indicator {
        text-align: center;
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.5px;

        margin-bottom: 14px;

        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.45);
      }

      .segment-track {
        position: relative;
        width: 100%;
        height: 42px;
        display: flex;
        align-items: center;
        cursor: pointer;
        touch-action: none;
      }

      .segment-background {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(9, 1fr);
        gap: 6px;
      }

      .segment {
        height: 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.28);
        transition: background-color 0.12s linear;
      }

      .segment.active {
        background: white;
      }

      .thumb {
        position: absolute;

        width: 24px;
        height: 24px;

        border-radius: 50%;

        background: white;

        top: 50%;

        transform: translate(-50%, -50%);

        box-shadow:
          0 2px 8px rgba(0, 0, 0, 0.25),
          0 4px 16px rgba(0, 0, 0, 0.18);

        pointer-events: none;
      }

      @media (max-width: 600px) {
        .bottom-panel {
          width: calc(100vw - 16px);
          bottom: 12px;
          padding: 16px;
        }

        .page-indicator {
          font-size: 15px;
        }

        .segment {
          height: 10px;
        }

        .thumb {
          width: 22px;
          height: 22px;
        }
      }
    </style>
  </head>

  <body>
    <div class="viewer">
      <img id="mainImage" src="" alt="图片" />
    </div>

    <div class="bottom-panel">
      <div class="page-indicator" id="distanceText">距离：100m</div>

      <div class="segment-track" id="track">
        <div class="segment-background" id="segments"></div>

        <div class="thumb" id="thumb"></div>
      </div>
    </div>

    <script>
      const imageList = [
        "./res/1.png",
        "./res/2.png",
        "./res/3.png",
        "./res/4.png",
        "./res/5.png",
        "./res/6.png",
        "./res/7.png",
        "./res/8.png",
        "./res/9.png",
      ];

      const distances = [100, 90, 80, 70, 60, 50, 40, 30, 0];

      const total = imageList.length;

      const imageEl = document.getElementById("mainImage");
      const track = document.getElementById("track");
      const thumb = document.getElementById("thumb");
      const segmentsContainer = document.getElementById("segments");
      const distanceText = document.getElementById("distanceText");

      let currentIndex = 0;
      let dragging = false;

      for (let i = 0; i < total; i++) {
        const item = document.createElement("div");
        item.className = "segment";
        segmentsContainer.appendChild(item);
      }

      const segmentEls = document.querySelectorAll(".segment");

      function updateView(index) {
        currentIndex = index;

        imageEl.src = imageList[index];

        distanceText.textContent = `距离：${distances[index]}m`;

        segmentEls.forEach((item, i) => {
          item.classList.toggle("active", i <= index);
        });

        const rect = track.getBoundingClientRect();

        const percent = index / (total - 1);

        thumb.style.left = `${percent * rect.width}px`;
      }

      function updateByPosition(clientX) {
        const rect = track.getBoundingClientRect();

        let x = clientX - rect.left;

        x = Math.max(0, Math.min(rect.width, x));

        const percent = x / rect.width;

        const index = Math.round(percent * (total - 1));

        updateView(index);
      }

      track.addEventListener("pointerdown", (e) => {
        dragging = true;

        updateByPosition(e.clientX);

        track.setPointerCapture(e.pointerId);
      });

      track.addEventListener("pointermove", (e) => {
        if (!dragging) return;

        updateByPosition(e.clientX);
      });

      track.addEventListener("pointerup", () => {
        dragging = false;
      });

      track.addEventListener("pointercancel", () => {
        dragging = false;
      });

      window.addEventListener("resize", () => {
        updateView(currentIndex);
      });

      updateView(0);
    </script>
  </body>
</html>
